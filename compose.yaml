services:
  app:
    build:
      context: .
      target: dev
      network: host
    command: sh -c "yarn db:push && yarn dev"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:5433/sara
      AUTH_SECRET: local-development-auth-secret-change-me
      AUTH_DISCORD_ID: local-development-discord-id
      AUTH_DISCORD_SECRET: local-development-discord-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
      - app_generated:/app/generated
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles:
      - production
    environment:
      POSTGRES_DB: sara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sara"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  app_node_modules:
  app_next:
  app_generated:
  postgres_data:
